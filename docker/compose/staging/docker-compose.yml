networks:
  accordo-staging-network:
    name: accordo-staging-network

services:
  accordo-postgres-staging:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${POSTGRES_PUBLISH_PORT}:5432"
    volumes:
      - accordo-staging-postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - accordo-staging-network

  accordo-backend-staging:
    build:
      context: ../../..
      dockerfile: Dockerfile
      target: runtime
      args:
        PORT: ${PORT}
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      LOG_LEVEL: ${LOG_LEVEL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: ${DB_SSL}
      DB_SSL_REJECT_UNAUTHORIZED: ${DB_SSL_REJECT_UNAUTHORIZED}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_SECRET: ${JWT_ACCESS_TOKEN_SECRET}
      JWT_REFRESH_TOKEN_SECRET: ${JWT_REFRESH_TOKEN_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      REDIS_URL: ${REDIS_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENAI_MAX_TOKENS: ${OPENAI_MAX_TOKENS}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
      LLM_TIMEOUT: ${LLM_TIMEOUT}
      EMBEDDING_SERVICE_URL: ${EMBEDDING_SERVICE_URL}
      VENDOR_PORTAL_URL: ${VENDOR_PORTAL_URL}
      CHATBOT_FRONTEND_URL: ${CHATBOT_FRONTEND_URL}
      CHATBOT_API_URL: ${CHATBOT_API_URL}
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - accordo-staging-uploads_data:/app/uploads
      - accordo-staging-logs_data:/app/logs
    depends_on:
      accordo-postgres-staging:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget -q -O- "http://127.0.0.1:$$PORT/api/health" > /dev/null || exit 1',
        ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - accordo-staging-network
    restart: unless-stopped

volumes:
  accordo-staging-postgres_data:
  accordo-staging-uploads_data:
  accordo-staging-logs_data:
